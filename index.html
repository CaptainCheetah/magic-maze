<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Magic Maze Timer</title>
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<link rel="apple-touch-icon" href="apple-touch-icon.png">
		<link rel="stylesheet" href="style.css" />
	</head>
	<body class="safe">
		<button type="button" onclick="MAGICMAZE.startTimer({duration: 180});" id="start">START TIMER</button>
		<button type="button" onclick="MAGICMAZE.resetTimer();" id="reset">RESET TIMER</button>
		<div id="timer">03:00</div>
		<button type="button" onclick="MAGICMAZE.flipTimer();" id="flip" disabled>FLIP TIMER</button>

		<script src="application.js"></script>
	</body>
</html>
